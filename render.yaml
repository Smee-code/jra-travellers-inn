services:
  - type: web
    name: travellers-inn-api
    env: python
    rootDir: .
    buildCommand: pip install -r requirements.txt && python backend/manage.py collectstatic --noinput && python backend/manage.py migrate
    startCommand: cd backend && gunicorn travellers_inn.wsgi:application
    envVars:
      - key: DEBUG
        value: "False"
      - key: DATABASE_SSL_REQUIRE
        value: "True"
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: SESSION_COOKIE_SECURE
        value: "True"
      - key: CSRF_COOKIE_SECURE
        value: "True"
      - key: SECURE_HSTS_SECONDS
        value: "3600"
      - key: PYTHON_VERSION
        value: "3.11.9"
